version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: eisenhower_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-eisenhower}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eisenhower_pass}
      POSTGRES_DB: ${DB_NAME:-eisenhower_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eisenhower -d eisenhower_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eisenhower_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - file_uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-eisenhower}:${DB_PASSWORD:-eisenhower_pass}@db:5432/${DB_NAME:-eisenhower_db}
      - SECRET_KEY=${JWT_SECRET:-eisenhower_super_secret_jwt_key_2026}
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: eisenhower_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  file_uploads:
    driver: local
